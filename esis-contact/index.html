<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>esis Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  color: #eaeaea;
  font-family: 'Source Code Pro', monospace;
  padding: 60px;
  line-height: 1.8;
}

.section {
  margin-bottom: 60px;
}

.title {
  font-size: 14px;
  opacity: 0.5;
  margin-bottom: 10px;
}

.content {
  font-size: 20px;
  white-space: pre-line; /* 줄바꿈 유지 */
}

.button {
  margin-top: 40px;
  border: 1px solid #eaeaea;
  padding: 12px 20px;
  width: fit-content;
  cursor: pointer;
  transition: 0.3s;
  opacity: 0; /* 처음 숨김 */
}

.button:hover {
  background: #eaeaea;
  color: black;
}

.ref-links {
  margin-top: 60px;
  margin-bottom: 60px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ref-links a {
  font-size: 13px;
  color: #777;
  text-decoration: none;
  transition: 0.3s;
}

.ref-links a:hover {
  color: #eaeaea;
}
</style>
</head>

<body>

<div class="section">
  <div class="title">06 / DEAL</div>
  <div class="content" id="typed-deal"></div>
</div>

<div class="section">
  <div class="title">07 / FOCUS</div>
  <div class="content" id="typed-focus"></div>
</div>

<div class="ref-links">

  <a href="http://kyuii.com/esis-contact/" target="_blank">esis</a>
  <a href="https://www.einsteininseoul.kr/" target="_blank">einsteininseoul</a>
  <a href="https://dolbag.kr/" target="_blank">dolbag 001</a>
  <a href="https://dolbag.kr/" target="_blank">dolbag 002</a>
  <a href="https://neuroethicssociety.org/meeting/neuroethics-2026/" target="_blank">paper INS Neuroethics 2026</a>
  <a href="http://kyuii.com/esis-contact/" target="_blank">GT2</a>
  <a href="http://kyuii.com/esis-contact/" target="_blank">znmn bag</a>

</div>
  
<div class="section">
  <div class="title">08 / CONTACT</div>
  <div class="content" id="typed-contact"></div>
</div>

<div class="button" id="cta">
  > request access
</div>

<!-- Typed.js -->
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<script>
new Typed("#typed-deal", {
  strings: [
`esis is currently opening early-stage collaboration
with selected partners and investors.`
  ],
  typeSpeed: 18,
  startDelay: 200,
  showCursor: false
});

new Typed("#typed-focus", {
  strings: [
`IP development
system expansion
global positioning`
  ],
  typeSpeed: 18,
  startDelay: 1500,
  showCursor: false
});

new Typed("#typed-contact", {
  strings: [
`kyuii
seoul / austin / global

contact: csakic21c.lab@gmail.com`
  ],
  typeSpeed: 18,
  startDelay: 3000,
  showCursor: false
});

// 버튼 마지막에 등장
setTimeout(() => {
  document.getElementById("cta").style.opacity = 1;
}, 5200);
</script>

<script>
const btn = document.getElementById("cta");

btn.addEventListener("click", () => {

  // 버튼 스타일 변경
  btn.style.background = "red";
  btn.style.color = "white";
  btn.style.borderColor = "red";

  // 텍스트 변경
  btn.innerText = "WARNING: unauthorized entry";

  // 살짝 흔들림 효과
  btn.style.animation = "shake 0.3s 2";

  // 딜레이 후 이동
  setTimeout(() => {
    window.location.href = "mailto:csakic21c.lab@gmail.com";
  }, 1500);

});
</script>

</body>
</html>
